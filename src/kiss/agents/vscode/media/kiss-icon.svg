<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Sitting baby: big round head, upright torso, legs out front -->

  <!-- Head (large) -->
  <circle cx="12" cy="6" r="4.5" />

  <!-- Eyes -->
  <circle cx="10.3" cy="5.5" r="0.6" fill="currentColor" stroke="none" />
  <circle cx="13.7" cy="5.5" r="0.6" fill="currentColor" stroke="none" />

  <!-- Smile -->
  <path d="M10.3 7.5 Q12 9.2 13.7 7.5" />

  <!-- Hair tuft -->
  <path d="M10.5 1.8 Q12 0.4 13.5 1.8" />

  <!-- Body/torso -->
  <path d="M9 10.2 Q9 15 10 16.5" />
  <path d="M15 10.2 Q15 15 14 16.5" />
  <path d="M10 16.5 Q12 17.5 14 16.5" />

  <!-- Left arm raised up happily -->
  <path d="M9 11.5 L5.5 8.5" />
  <!-- Left hand -->
  <circle cx="5.2" cy="8.2" r="0.9" />

  <!-- Right arm raised up happily -->
  <path d="M15 11.5 L18.5 8.5" />
  <!-- Right hand -->
  <circle cx="18.8" cy="8.2" r="0.9" />

  <!-- Left leg out front -->
  <path d="M10 16 Q8 18 6.5 19" />
  <!-- Left foot -->
  <ellipse cx="5.8" cy="19.5" rx="1.3" ry="0.8" />

  <!-- Right leg out front -->
  <path d="M14 16 Q16 18 17.5 19" />
  <!-- Right foot -->
  <ellipse cx="18.2" cy="19.5" rx="1.3" ry="0.8" />
</svg>
